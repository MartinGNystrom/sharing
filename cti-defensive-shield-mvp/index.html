<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CTI Defensive Shield — MVP</title>
<style>
  :root {
    --bg: #F2F4F6; --surface: #FFFFFF; --ink: #10151B; --muted: #55606B;
    --line: #D5DBE0; --accent: #146C74; --err: #A6291F;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0B1013; --surface:#141B21; --ink:#E7ECEF; --muted:#93A1AC; --line:#263139; --accent:#5CC8CE; --err:#FF8A75; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  }
  #gate {
    max-width: 360px; width: 100%; border: 1px solid var(--line); background: var(--surface);
    padding: 2rem 1.75rem; text-align: center;
  }
  #gate p.eyebrow {
    font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 0.5rem;
  }
  #gate h1 { font-size: 1.25rem; margin: 0 0 1.25rem; font-weight: 600; }
  #gate input[type="password"] {
    width: 100%; font-size: 1rem; padding: 0.55rem 0.7rem; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); font-family: var(--mono); margin-bottom: 0.9rem;
  }
  #gate button {
    width: 100%; font-size: 0.9rem; padding: 0.6rem 0.7rem; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; font-family: var(--mono); letter-spacing: 0.04em;
    text-transform: uppercase; cursor: pointer;
  }
  #gate button:hover { opacity: 0.9; }
  #gate input:focus-visible, #gate button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #err { color: var(--err); font-size: 0.8rem; margin-top: 0.7rem; min-height: 1em; font-family: var(--mono); }
  body.unlocked { display: block; padding: 0; }
</style>
</head>
<body>

    <h1>Enter the password to view this briefing</h1>
    <input type="password" id="pw" autofocus autocomplete="off" spellcheck="false">
    <button id="go">Unlock</button>
    <div id="err"></div>
  </div>
  <div id="content"></div>

const ITERATIONS = 250000;

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function tryUnlock(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64ToBytes(SALT), iterations: ITERATIONS, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64ToBytes(IV) },
    key,
    b64ToBytes(CIPHERTEXT)
  );
  return new TextDecoder().decode(plainBuf);
}

document.getElementById("go").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") unlock(); });

async function unlock() {
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "";
  try {
    const html = await tryUnlock(pw);
    document.getElementById("content").innerHTML = html;
    document.getElementById("gate").remove();
    document.body.classList.add("unlocked");
    sessionStorage.setItem("halocon-pw", pw);
  } catch (e) {
    err.textContent = "Incorrect password.";
  }
}

(async () => {
  const cached = sessionStorage.getItem("halocon-pw");
  if (cached) {
    try {
      const html = await tryUnlock(cached);
      document.getElementById("content").innerHTML = html;
      document.getElementById("gate").remove();
      document.body.classList.add("unlocked");
    } catch (e) { sessionStorage.removeItem("halocon-pw"); }
  }
})();
</script>
